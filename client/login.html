<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DominiFinds</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-brand">
      <img src="/assets/images/domini.png" alt="" class="auth-logo">
      <p>Smart Lost & Found System</p>
    </div>

    <div class="auth-form">
      <h2>Sign in</h2>
      <p>Enter your school email and password to continue.</p>

      <div id="errorMessage" class="error-message"></div>

      <form id="loginForm">
        <div class="field-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@school.edu" required autocomplete="email" />
        </div>

<div class="field-group">
  <label for="password">Password</label>
  <div class="password-wrapper">
    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
    
    <button type="button" class="password-toggle">
      <img src="/assets/icons/show.png" class="eye-icon" alt="Toggle Password">
    </button>
  </div>
</div>

        <button type="submit" class="auth-button">Login</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Client config (fallback for development) -->
  <script src="/js/config.js"></script>

  <!-- INJECT_CONFIG -->
  <!-- Your auth file -->
  <script src="/js/auth.js"></script>

  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorMessage");

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();

      try {
        // Wait for Supabase to be initialized
        await window.waitForSupabaseClient();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        // 1. LOGIN
        await loginWithEmail(email, password);

        // 2. GET SESSION (IMPORTANT FIX)
        const { data } = await supabaseClient.auth.getSession();
        const userId = data?.session?.user?.id;

        if (!userId) throw new Error("No session found");

        // 3. REDIRECT BASED ON ROLE
        await redirectBasedOnRole(userId);

      } catch (err) {
        showError(err.message || 'Login failed. Please try again.');
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        initPasswordToggle();
        
        // Wait for Supabase to be initialized
        await window.waitForSupabaseClient();
        
        // Then check auth and redirect if needed
        await checkAuthAndRedirect();
      } catch (error) {
        console.error('Initialization error:', error);
        // Don't block login page on initialization error
      }
    });
  </script>
</body>

</html>
