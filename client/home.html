<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DominiFinds - Lost and Found</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/client.css">
</head>

<body class="client-layout">
  <header class="client-header">
    <h1>DominiFinds</h1>
    <p>Find your lost items here.</p>
  </header>

  <main class="client-main container">
    <div class="client-controls">
      <div class="search-group">
        <input type="text" id="searchBar" placeholder="Search items by name...">
        <button class="btn btn-primary" id="refreshBtn">Refresh</button>
      </div>
    </div>

    <section class="items-section">
      <h2>Available Items</h2>
      <div id="approvedContainer" class="items-grid"></div>
    </section>
  </main>

  <!-- Claim Request Modal -->
  <div id="claimModal" class="modal" aria-hidden="true">
    <div class="modal-overlay" data-close-modal></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="claimModalTitle">
      <header class="modal-header">
        <h2 id="claimModalTitle">Request to Claim Item</h2>
        <button type="button" class="modal-close" data-close-modal aria-label="Close">&times;</button>
      </header>
      <div class="modal-body">
        <p id="claimModalItemName" class="modal-item-name"></p>

        <label class="modal-label" for="studentEmail">Your Email <span class="required">*</span></label>
        <input type="email" id="studentEmail" class="modal-input" placeholder="you@example.com" required />

        <label class="modal-label" for="pickupNotes">Pickup Notes or Message to Admin <span
            class="optional">(optional)</span></label>
        <textarea id="pickupNotes" class="modal-textarea"
          placeholder="Any additional information about pickup..."></textarea>

        <div class="contact-info">
          <h4>Contact Information</h4>
          <p><strong>Admin:</strong> admin@school.edu</p>
          <p><strong>Lost & Found:</strong> (555) 123-4567</p>
        </div>

        <div id="claimModalMessage" class="modal-message" aria-live="polite"></div>
      </div>
      <footer class="modal-footer">
        <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
        <button type="button" class="btn btn-primary" id="requestClaimBtn">Request Claim</button>
      </footer>
    </div>
  </div>

  <!-- Image Preview Modal -->
  <div id="imageModal" class="image-modal" aria-hidden="true">
    <div class="image-modal-overlay" data-close-image-modal></div>
    <div class="image-modal-content">
      <button type="button" class="image-modal-close" data-close-image-modal aria-label="Close">&times;</button>
      <img id="imageModalImg" src="" alt="Item Image" class="image-modal-img">
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>

</html>
