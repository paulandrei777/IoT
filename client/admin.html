<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DominiFinds Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <h1>DominiFinds Admin Dashboard</h1>
    <p>Review detected lost items and approve them for student viewing.</p>
  </header>

  <section id="statistics">
    <div class="stat-card">
      <h3>Total Items</h3>
      <p id="totalItems">0</p>
    </div>
    <div class="stat-card">
      <h3>Pending Items</h3>
      <p id="pendingItems">0</p>
    </div>
    <div class="stat-card">
      <h3>Approved Items</h3>
      <p id="approvedItems">0</p>
    </div>
    <div class="stat-card">
      <h3>Claimed Items</h3>
      <p id="claimedItems">0</p>
    </div>
  </section>

  <section id="controls">
    <input type="text" id="searchBar" placeholder="Search items by name...">
    <button id="refreshBtn">Refresh</button>
  </section>

  <section id="pendingItemsSection">
    <h2>Pending Items</h2>
    <div id="pendingContainer" class="items-grid"></div>
  </section>

  <section id="approvedItemsSection">
    <h2>Approved Items</h2>
    <div id="approvedContainer" class="items-grid"></div>
  </section>

  <section id="claimedItemsSection">
    <h2>Claimed Items</h2>
    <div id="claimedContainer" class="items-grid"></div>
  </section>

  <script src="js/admin.js"></script>
</body>

</html>
