<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DominiFinds - Lost and Found</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <h1>DominiFinds</h1>
    <p>Find your lost items here.</p>
  </header>

  <section id="controls">
    <input type="text" id="searchBar" placeholder="Search items by name...">
    <button id="refreshBtn">Refresh</button>
  </section>

  <section id="approvedItemsSection">
    <h2>Available Items</h2>
    <div id="approvedContainer" class="items-grid"></div>
  </section>

  <script src="js/main.js"></script>
</body>

</html>
